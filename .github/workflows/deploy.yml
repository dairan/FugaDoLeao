name: Deploy Web

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    env:
      GODOT_VERSION: "4.6.2"
      GODOT_STATUS: stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y --no-install-recommends unzip ca-certificates

      - name: Download Godot (standard)
        run: |
          set -euo pipefail
          ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          curl -L "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${ZIP}" \
            -o "$RUNNER_TEMP/godot.zip"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          GODOT_BIN="$(find "$RUNNER_TEMP/godot" -type f -name 'Godot_v*linux*' | head -n 1)"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

      - name: Download export templates
        run: |
          set -euo pipefail
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          curl -L "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TPZ}" \
            -o "$RUNNER_TEMP/templates.tpz"
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q "$RUNNER_TEMP/templates.tpz" -d "$RUNNER_TEMP/templates"
          cp "$RUNNER_TEMP/templates/templates/"* "$TEMPLATES_DIR/"

      - name: Import project
        run: '"$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --import'

      - name: Export web
        run: |
          mkdir -p build/web
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --export-release "Web" build/web/index.html

      - name: Compress WASM
        run: gzip -9 build/web/index.wasm

      - name: Add headers and redirects
        run: |
          cat > build/web/_headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
            Cross-Origin-Resource-Policy: cross-origin

          /index.wasm.gz
            Content-Type: application/wasm
            Content-Encoding: gzip
          EOF

          cat > build/web/_redirects << 'EOF'
          /index.wasm /index.wasm.gz 200
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=fugadoleao --commit-dirty=true
