name: Deploy Web

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    env:
      GODOT_VERSION: "4.6.2"
      GODOT_STATUS: stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y --no-install-recommends unzip ca-certificates

      - name: Download Godot (standard)
        run: |
          set -euo pipefail
          ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          curl -L "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${ZIP}" \
            -o "$RUNNER_TEMP/godot.zip"
          unzip -q "$RUNNER_TEMP/godot.zip" -d "$RUNNER_TEMP/godot"
          GODOT_BIN="$(find "$RUNNER_TEMP/godot" -type f -name 'Godot_v*linux*' | head -n 1)"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

      - name: Download export templates
        run: |
          set -euo pipefail
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          curl -L "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TPZ}" \
            -o "$RUNNER_TEMP/templates.tpz"
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q "$RUNNER_TEMP/templates.tpz" -d "$RUNNER_TEMP/templates"
          cp "$RUNNER_TEMP/templates/templates/"* "$TEMPLATES_DIR/"

      - name: Import project
        run: '"$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --import'

      - name: Export web
        run: |
          mkdir -p build/web
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --export-release "Web" build/web/index.html

      - name: Install butler
        run: |
          curl -L "https://github.com/itchio/butler/releases/download/v15.26.1/butler-linux-amd64.zip" \
            -o butler.zip
          unzip -q butler.zip -d butler_dir
          BUTLER_BIN="$(find butler_dir -type f -name 'butler' | head -n 1)"
          chmod +x "$BUTLER_BIN"
          echo "BUTLER_BIN=$BUTLER_BIN" >> "$GITHUB_ENV"

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: "$BUTLER_BIN" push build/web dairantf/fuga-do-leao:web
